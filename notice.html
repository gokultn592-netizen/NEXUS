<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Material Hub | Notice Board</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap"
        rel="stylesheet">

    <!-- GSAP & Lenis -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #030005;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #9d4edd;
            --accent-bright: #c77dff;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --cursor-color: #c77dff;
            --success: #10b981;
            --warning: #f59e0b;
        }

        [data-theme="light"] {
            --bg-color: #f8f7f5;
            --text-main: #18181b;
            --text-muted: #71717a;
            --accent: #7b2cbf;
            --accent-bright: #5a189a;
            --panel-bg: rgba(0, 0, 0, 0.03);
            --border: rgba(0, 0, 0, 0.08);
            --cursor-color: #7b2cbf;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }

        h1, h2, h3, .logo {
            font-family: 'Syne', sans-serif;
        }

        /* Custom cursor */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: var(--cursor-color);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            transition: width 0.3s, height 0.3s, background-color 0.3s;
        }

        .custom-cursor.active {
            width: 60px;
            height: 60px;
            background-color: transparent;
            border: 1px solid var(--cursor-color);
        }

        /* Background */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E');
            pointer-events: none;
            z-index: 10;
        }

        .blob {
            position: fixed;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.15) 0%, transparent 60%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            top: -40%;
            left: -20%;
            filter: blur(80px);
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 4vw;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            mix-blend-mode: difference;
        }

        .logo {
            font-size: 2vw;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-links {
            display: flex;
            gap: 3vw;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            height: 100%;
            line-height: 1;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: white;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        .nav-links a:hover::after {
            transform: translateX(0);
        }

        /* User badge */
        .user-badge {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .user-badge img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-badge .user-name {
            color: var(--text-main);
            font-weight: 500;
        }

        .user-badge .user-role {
            color: var(--accent);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        #user-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* Hero */
        .hero {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 8rem 4vw 0;
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: 8vw;
            line-height: 1.1;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .hero .accent-text {
            color: transparent;
            -webkit-text-stroke: 1px var(--text-main);
        }

        /* Content */
        .content-wrapper {
            padding: 4vw;
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
        }

        .post-notice-btn {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 3rem;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 3rem;
            transition: all 0.3s ease;
            cursor: none;
        }

        .post-notice-btn:hover {
            background: var(--accent-bright);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 20px rgba(157, 78, 221, 0.3);
        }

        .notice-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .notice-card {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .notice-card:hover {
            transform: translateY(-5px) scale(1.01);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .notice-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(800px circle at var(--mouse-x) var(--mouse-y), rgba(157, 78, 221, 0.08), transparent 40%);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .notice-card:hover::before {
            opacity: 1;
        }

        .notice-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .notice-header h2 {
            font-size: 1.8rem;
            color: var(--text-main);
            max-width: 80%;
        }

        .notice-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.25rem;
        }

        .notice-date {
            color: var(--accent);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .notice-author {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .notice-content {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
            white-space: pre-wrap;
        }

        .notice-actions {
            display: flex;
            gap: 1rem;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .notice-card:hover .notice-actions {
            opacity: 1;
            transform: translateY(0);
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .action-btn.delete:hover {
            background: #ef4444;
            border-color: #ef4444;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--bg-color);
            padding: 3rem;
            border-radius: 2rem;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 600px;
            transform: translateY(30px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }

        .modal h2 {
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .modal-btn {
            flex: 1;
            padding: 1rem;
            border-radius: 1rem;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            transition: all 0.3s ease;
            cursor: none;
        }

        .modal-btn.primary {
            background: var(--accent);
            color: white;
        }

        .modal-btn.primary:hover {
            background: var(--accent-bright);
            transform: translateY(-2px);
        }

        .modal-btn.secondary {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .modal-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .hidden { display: none !important; }

        .hidden { display: none !important; }

        /* Notifications */
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -10px;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            display: none;
        }

        .notification-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: var(--bg-color);
            border-left: 1px solid var(--border);
            z-index: 1001;
            padding: 3rem 2rem;
            transition: right 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            backdrop-filter: blur(20px);
        }

        .notification-panel.active { right: 0; }
        .notification-item { padding: 1.5rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; color: var(--text-muted); }
        .notification-item b { color: var(--text-main); display: block; margin-bottom: 0.2rem; }
        .notification-time { font-size: 0.75rem; color: var(--accent); display: block; margin-top: 0.5rem; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 12vw; }
            .notice-header h2 { font-size: 1.4rem; }
            .custom-cursor { display: none; }
            .logo { font-size: 5vw; }
        }
    </style>
</head>

<body>
    <div class="noise"></div>
    <div class="blob"></div>
    <div class="custom-cursor"></div>

    <header>
        <div class="logo">
            <a href="index.html" style="color: inherit; text-decoration: none;">Nexus</a>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="notice.html">Notice</a>
            <a href="discussion.html">Discussion</a>
            <a href="#" id="notifications-link" style="position: relative;">
                Notifications
                <span id="notif-badge" class="notification-badge"></span>
            </a>
            <div id="user-section" class="hidden"></div>
            <a href="#" id="login-link">Login</a>
        </nav>
    </header>

    <div id="notification-panel" class="notification-panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
            <h2 style="font-family: 'Syne';">Updates</h2>
            <button id="close-notifs" style="background: none; border: none; color: white; cursor: pointer; font-size: 1.5rem;">×</button>
        </div>
        <div id="notif-list">
            <p style="color: var(--text-muted); text-align: center; margin-top: 5rem;">No new notifications</p>
        </div>
    </div>

    <section class="hero">
        <h1>Notice<br><span class="accent-text">Board.</span></h1>
        <p style="font-size: 1.2rem; max-width: 500px; color: var(--text-muted);">
            Real-time announcements and class schedules for the Nexus community.
        </p>
    </section>

    <div class="content-wrapper">
        <button id="post-notice-btn" class="post-notice-btn hidden">
            <span>+ Post New Notice</span>
        </button>

        <div id="notice-grid" class="notice-grid">
            <!-- Notices loaded here -->
            <div style="text-align: center; padding: 4rem; color: var(--text-muted);">
                <div style="font-size: 2rem; margin-bottom: 1rem;">⌛</div>
                <p>Loading latest announcements...</p>
            </div>
        </div>
    </div>

    <!-- Post/Edit Notice Modal -->
    <div class="modal-overlay" id="notice-modal">
        <div class="modal">
            <h2 id="modal-title">Post New Notice</h2>
            <form id="notice-form">
                <input type="hidden" id="notice-id">
                <div class="input-group">
                    <label>Title</label>
                    <input type="text" id="notice-form-title" placeholder="e.g. Mid-term Exam Schedule" required>
                </div>
                <div class="input-group">
                    <label>Content</label>
                    <textarea id="notice-form-content" rows="6" placeholder="Write the announcement details here..." required></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="modal-btn secondary" id="close-modal">Cancel</button>
                    <button type="submit" class="modal-btn primary">Publish Notice</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="auth-modal">
        <div class="modal">
            <h2>Welcome</h2>
            <p style="text-align:center; color:var(--text-muted); margin-bottom:2rem;">Sign in with Google to access Nexus</p>
            <button class="modal-btn primary" id="google-signin-btn" style="width:100%;">
                Continue with Google
            </button>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCKqtJJpby6oXpI1wNfqpE5u9-HRwDZzmg",
            authDomain: "nexus-e7a36.firebaseapp.com",
            projectId: "nexus-e7a36",
            storageBucket: "nexus-e7a36.firebasestorage.app",
            messagingSenderId: "516259533933",
            appId: "1:516259533933:web:fc190f6c0f203e47785b64"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let currentUser = null;
        let userData = null;

        // Custom Cursor
        const cursor = document.querySelector('.custom-cursor');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1, ease: "power2.out" });
        });

        function initCursorHover() {
            document.querySelectorAll('a, button, .notice-card, .user-badge').forEach(el => {
                el.addEventListener('mouseenter', () => cursor.classList.add('active'));
                el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
            });
        }

        // Smooth Scroll
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // Auth Listener
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const docSnap = await db.collection('users').doc(user.uid).get();
                userData = docSnap.exists ? docSnap.data() : null;

                if (userData && (userData.role === 'admin' || userData.role === 'friend')) {
                    showUserBadge(user, userData.role);
                    document.getElementById('post-notice-btn').classList.remove('hidden');
                    loadNotices();
                } else {
                    // Show pending message and logout
                    alert('Your account is marked as PENDING. An admin must approve your account.');
                    await auth.signOut();
                    currentUser = null;
                    showLoginButton();
                }
            } else {
                currentUser = null;
                userData = null;
                showLoginButton();
                loadNotices(); // Publicly viewable? Let's assume yes, but no editing.
            }
        });

        async function getUserData(uid) {
            const doc = await db.collection('users').doc(uid).get();
            return doc.exists ? doc.data() : null;
        }

        function showUserBadge(user, role) {
            const loginLink = document.getElementById('login-link');
            const userSection = document.getElementById('user-section');
            loginLink.classList.add('hidden');
            userSection.classList.remove('hidden');
            
            const nameDisplay = userData && userData.name ? userData.name : (user.displayName || user.email);

            userSection.innerHTML = `
                <div class="user-badge" id="user-badge-trigger" title="Click to change display name">
                    <img src="${user.photoURL || 'https://via.placeholder.com/32'}" alt="Profile">
                    <div>
                        <div class="user-name">${nameDisplay}</div>
                        <div class="user-role">${role}</div>
                    </div>
                </div>
                <a href="#" id="logout-link" style="color: var(--text-muted); font-size: 0.9rem; text-decoration: none;">Logout</a>
            `;
            
            document.getElementById('logout-link').addEventListener('click', (e) => {
                e.preventDefault();
                auth.signOut();
            });

            document.getElementById('user-badge-trigger').addEventListener('click', async () => {
                const newName = prompt('Enter new display name:', nameDisplay);
                if (newName && newName.trim() !== '' && newName !== nameDisplay) {
                    if (confirm(`Change display name to "${newName.trim()}"?`)) {
                        await db.collection('users').doc(user.uid).update({ name: newName.trim() });
                        window.location.reload();
                    }
                }
            });
            initCursorHover();
        }

        function showLoginButton() {
            document.getElementById('login-link').classList.remove('hidden');
            document.getElementById('user-section').classList.add('hidden');
            document.getElementById('post-notice-btn').classList.add('hidden');
        }

        document.getElementById('login-link').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('auth-modal').classList.add('active');
        });

        document.getElementById('google-signin-btn').addEventListener('click', () => {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
            document.getElementById('auth-modal').classList.remove('active');
        });

        // NOTICE LOGIC
        function loadNotices() {
            db.collection('notices').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
                const grid = document.getElementById('notice-grid');
                grid.innerHTML = '';
                
                if (snapshot.empty) {
                    grid.innerHTML = '<div style="text-align: center; padding: 4rem; color: var(--text-muted);">No notices posted yet.</div>';
                    return;
                }

                snapshot.forEach(doc => {
                    const notice = doc.data();
                    const date = notice.createdAt ? notice.createdAt.toDate().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : 'Just now';
                    
                    const card = document.createElement('div');
                    card.className = 'notice-card';
                    card.innerHTML = `
                        <div class="notice-header">
                            <h2>${notice.title}</h2>
                            <div class="notice-meta">
                                <span class="notice-date">${date}</span>
                                <span class="notice-author">by ${notice.authorName}</span>
                            </div>
                        </div>
                        <p class="notice-content">${notice.content}</p>
                        ${(userData && (userData.role === 'admin' || userData.uid === notice.authorId)) ? `
                            <div class="notice-actions">
                                <button class="action-btn" onclick="editNotice('${doc.id}', '${notice.title.replace(/'/g, "\\'")}', '${notice.content.replace(/'/g, "\\'")}')">Edit</button>
                                <button class="action-btn delete" onclick="deleteNotice('${doc.id}')">Delete</button>
                            </div>
                        ` : ''}
                    `;
                    
                    card.addEventListener('mousemove', (e) => {
                        const rect = card.getBoundingClientRect();
                        card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
                        card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
                    });
                    
                    grid.appendChild(card);
                });
                initCursorHover();
            });
        }

        // Modal Logic
        const noticeModal = document.getElementById('notice-modal');
        const noticeForm = document.getElementById('notice-form');
        
        document.getElementById('post-notice-btn').addEventListener('click', () => {
            document.getElementById('modal-title').textContent = 'Post New Notice';
            noticeForm.reset();
            document.getElementById('notice-id').value = '';
            noticeModal.classList.add('active');
        });

        document.getElementById('close-modal').addEventListener('click', () => noticeModal.classList.remove('active'));

        noticeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('notice-id').value;
            const title = document.getElementById('notice-form-title').value;
            const content = document.getElementById('notice-form-content').value;

            if (!userData) return;

            const noticeData = {
                title,
                content,
                authorName: userData.name || currentUser.displayName || 'Anonymous',
                authorId: currentUser.uid,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                if (id) {
                    await db.collection('notices').doc(id).update(noticeData);
                } else {
                    noticeData.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                    await db.collection('notices').add(noticeData);
                    
                    // Trigger Notification
                    await db.collection('notifications').add({
                        title: 'New Announcement',
                        message: `${noticeData.authorName} posted: ${noticeData.title}`,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                noticeModal.classList.remove('active');
            } catch (err) {
                alert('Error saving notice: ' + err.message);
            }
        });

        function editNotice(id, title, content) {
            document.getElementById('modal-title').textContent = 'Edit Notice';
            document.getElementById('notice-id').value = id;
            document.getElementById('notice-form-title').value = title;
            document.getElementById('notice-form-content').value = content;
            noticeModal.classList.add('active');
        }

        async function deleteNotice(id) {
            if (confirm('Delete this announcement permanently?')) {
                await db.collection('notices').doc(id).delete();
            }
        }

        window.editNotice = editNotice;
        window.deleteNotice = deleteNotice;

        // Notifications
        function initNotifications() {
            const badge = document.getElementById('notif-badge');
            const list = document.getElementById('notif-list');
            const panel = document.getElementById('notification-panel');
            const trigger = document.getElementById('notifications-link');
            const closeBtn = document.getElementById('close-notifs');

            trigger.addEventListener('click', (e) => {
                e.preventDefault();
                panel.classList.toggle('active');
                badge.style.display = 'none';
            });

            closeBtn.addEventListener('click', () => panel.classList.remove('active'));

            db.collection('notifications').orderBy('createdAt', 'desc').limit(10).onSnapshot(snap => {
                if (snap.empty) {
                    list.innerHTML = '<p style="color: var(--text-muted); text-align: center; margin-top: 5rem;">No new notifications</p>';
                    return;
                }
                if (!panel.classList.contains('active')) badge.style.display = 'block';
                list.innerHTML = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    const time = data.createdAt ? data.createdAt.toDate().toLocaleTimeString() : 'Just now';
                    const item = document.createElement('div');
                    item.className = 'notification-item';
                    item.innerHTML = `<b>${data.title}</b><span>${data.message}</span><span class="notification-time">${time}</span>`;
                    list.appendChild(item);
                });
            });
        }
        initNotifications();

        // Animations
        gsap.from('.hero h1', { y: 100, opacity: 0, duration: 1.5, ease: "power4.out", delay: 0.2 });
        gsap.from('.hero p', { y: 50, opacity: 0, duration: 1.5, ease: "power4.out", delay: 0.4 });
    </script>
</body>

</html>
